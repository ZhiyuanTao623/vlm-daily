name: Daily VLM papers

on:
  schedule:
    # 01:00 UTC ~= 09:00 Beijing time, every day
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: vlm-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch papers and render pages
        run: python vlm_daily.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update VLM papers ($(date -u +%Y-%m-%d))"
            git push
          fi
